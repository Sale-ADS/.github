name: Auto-add to Product Board

on:
  issues:
    types: [opened]

jobs:
  add-to-project:
    name: Add issue to SaleADS Product Board
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1
        with:
          project-url: https://github.com/orgs/Sale-ADS/projects/3
          github-token: ${{ secrets.PROJECT_TOKEN }}

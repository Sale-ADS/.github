name: Auto-add to Product Board

# Reusable workflow - repos call this to auto-add issues to the Product Board.
# Usage in each repo's .github/workflows/auto-add-to-project.yml:
#
#   name: Auto-add to Product Board
#   on:
#     issues:
#       types: [opened]
#   jobs:
#     add:
#       uses: Sale-ADS/.github/.github/workflows/auto-add-to-project.yml@main
#       secrets: inherit
#
on:
  workflow_call:

jobs:
  add-to-project:
    name: Add issue to SaleADS Product Board
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1
        with:
          project-url: https://github.com/orgs/Sale-ADS/projects/3
          github-token: ${{ secrets.PROJECT_TOKEN }}
